<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SalesAI — SDR Assessment</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    .header {
      text-align: center;
      margin-bottom: 48px;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      color: #94a3b8;
      margin-top: 8px;
      font-size: 0.95rem;
    }

    .progress-bar {
      background: #1e2537;
      border-radius: 99px;
      height: 4px;
      margin-bottom: 36px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .question-card {
      background: #1a1f2e;
      border: 1px solid #2d3448;
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 24px;
    }

    .question-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #60a5fa;
      margin-bottom: 12px;
    }

    .question-text {
      font-size: 1.05rem;
      line-height: 1.6;
      color: #e2e8f0;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3448;
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 0.95rem;
      line-height: 1.6;
      padding: 14px 16px;
      resize: vertical;
      min-height: 110px;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    textarea:focus {
      outline: none;
      border-color: #60a5fa;
    }

    textarea::placeholder { color: #4a5568; }

    .char-count {
      text-align: right;
      font-size: 0.75rem;
      color: #4a5568;
      margin-top: 6px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:active { transform: scale(0.99); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) { opacity: 0.9; }

    /* Results */
    .result-card {
      background: #1a1f2e;
      border: 1px solid #2d3448;
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 24px;
    }

    .score-ring {
      text-align: center;
      margin-bottom: 28px;
    }

    .score-number {
      font-size: 4rem;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .score-label { color: #94a3b8; font-size: 0.85rem; margin-top: 4px; }

    .badge {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 99px;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-top: 12px;
    }

    .badge-strong  { background: #064e3b; color: #6ee7b7; }
    .badge-hire    { background: #1e3a5f; color: #93c5fd; }
    .badge-consider { background: #3b2f10; color: #fcd34d; }
    .badge-reject  { background: #4c1414; color: #fca5a5; }

    .summary {
      color: #cbd5e1;
      line-height: 1.7;
      margin-bottom: 24px;
      font-size: 0.95rem;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      margin-bottom: 10px;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tag {
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 0.82rem;
    }

    .tag-strength { background: #0d2b1f; color: #6ee7b7; border: 1px solid #064e3b; }
    .tag-concern  { background: #2b0d0d; color: #fca5a5; border: 1px solid #4c1414; }

    .dims {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .dim-item { }

    .dim-label {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
    }

    .dim-bar {
      background: #0f1117;
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
    }

    .dim-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
    }

    .error-box {
      background: #2b0d0d;
      border: 1px solid #4c1414;
      border-radius: 12px;
      color: #fca5a5;
      padding: 16px 20px;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid #2d3448;
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading p { color: #64748b; font-size: 0.9rem; }

    .btn-restart {
      background: #1e2537;
      color: #94a3b8;
      border: 1px solid #2d3448;
      margin-top: 8px;
    }

    .btn-restart:hover { background: #2d3448; color: #e2e8f0; }

    @media (max-width: 480px) {
      .dims { grid-template-columns: 1fr; }
      .score-number { font-size: 3rem; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const BADGE = {
  "Strong Hire": "badge-strong",
  "Hire": "badge-hire",
  "Consider": "badge-consider",
  "Reject": "badge-reject",
};

function DimBar({ label, value }) {
  return (
    <div className="dim-item">
      <div className="dim-label">
        <span>{label}</span>
        <span>{value}</span>
      </div>
      <div className="dim-bar">
        <div className="dim-fill" style={{ width: `${value}%` }} />
      </div>
    </div>
  );
}

function App() {
  const [questions, setQuestions] = useState([]);
  const [answers, setAnswers] = useState([]);
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [loadingQ, setLoadingQ] = useState(true);

  useEffect(() => {
    fetch("/api/questions")
      .then(r => r.json())
      .then(d => {
        setQuestions(d.questions);
        setAnswers(new Array(d.questions.length).fill(""));
        setLoadingQ(false);
      })
      .catch(() => {
        setError("Failed to load questions. Is the server running?");
        setLoadingQ(false);
      });
  }, []);

  const filled = answers.filter(a => a.trim().length >= 20).length;
  const allFilled = questions.length > 0 && filled === questions.length;
  const progress = questions.length ? (filled / questions.length) * 100 : 0;

  async function handleSubmit() {
    setError(null);
    setLoading(true);
    try {
      const res = await fetch("/api/score", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ answers }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Unknown error");
      setResult(data);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  }

  function handleRestart() {
    setResult(null);
    setAnswers(new Array(questions.length).fill(""));
    setError(null);
  }

  if (loadingQ) return (
    <div className="container">
      <div className="loading">
        <div className="spinner" />
        <p>Loading assessment…</p>
      </div>
    </div>
  );

  return (
    <div className="container">
      <div className="header">
        <h1>SalesAI Assessment</h1>
        <p>SDR Candidate Evaluation — 5 Questions</p>
      </div>

      {!result ? (
        <>
          <div className="progress-bar">
            <div className="progress-fill" style={{ width: `${progress}%` }} />
          </div>

          {error && <div className="error-box">{error}</div>}

          {questions.map((q, i) => (
            <div className="question-card" key={i}>
              <div className="question-label">Question {i + 1} of {questions.length}</div>
              <div className="question-text">{q}</div>
              <textarea
                placeholder="Type your answer here (min 20 characters)…"
                value={answers[i]}
                onChange={e => {
                  const next = [...answers];
                  next[i] = e.target.value;
                  setAnswers(next);
                }}
              />
              <div className="char-count">{answers[i].length} chars</div>
            </div>
          ))}

          <button
            className="btn btn-primary"
            disabled={!allFilled || loading}
            onClick={handleSubmit}
          >
            {loading ? "Analyzing…" : `Submit & Score (${filled}/${questions.length} answered)`}
          </button>

          {loading && (
            <div className="loading" style={{ paddingTop: 40 }}>
              <div className="spinner" />
              <p>AI is evaluating responses…</p>
            </div>
          )}
        </>
      ) : (
        <>
          <div className="result-card">
            <div className="score-ring">
              <div className="score-number">{result.score}</div>
              <div className="score-label">Overall Score / 100</div>
              <div>
                <span className={`badge ${BADGE[result.recommendation] || "badge-consider"}`}>
                  {result.recommendation}
                </span>
              </div>
            </div>

            <p className="summary">{result.summary}</p>

            {result.strengths?.length > 0 && (
              <>
                <div className="section-title">Strengths</div>
                <div className="tag-list">
                  {result.strengths.map((s, i) => (
                    <span key={i} className="tag tag-strength">{s}</span>
                  ))}
                </div>
              </>
            )}

            {result.concerns?.length > 0 && (
              <>
                <div className="section-title">Concerns</div>
                <div className="tag-list">
                  {result.concerns.map((c, i) => (
                    <span key={i} className="tag tag-concern">{c}</span>
                  ))}
                </div>
              </>
            )}

            {result.dimension_scores && (
              <>
                <div className="section-title" style={{ marginTop: 8 }}>Dimension Scores</div>
                <div className="dims">
                  {Object.entries(result.dimension_scores).map(([k, v]) => (
                    <DimBar key={k} label={k.charAt(0).toUpperCase() + k.slice(1)} value={v} />
                  ))}
                </div>
              </>
            )}
          </div>

          {error && <div className="error-box">{error}</div>}

          <button className="btn btn-restart" onClick={handleRestart}>
            Start New Assessment
          </button>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
